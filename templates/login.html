<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Employee Churn Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #f4f4f0;
    --grey: #1a1a1a;
    --mid: #2e2e2e;
    --accent: #e8e8e0;
    --border: #333;
  }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(40px, 40px); }
  }

  /* Floating orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.07;
    animation: orbFloat 12s ease-in-out infinite;
    z-index: 0;
  }
  .orb1 { width: 400px; height: 400px; background: white; top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: white; bottom: -80px; right: -80px; animation-delay: -6s; }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(30px, 30px) scale(1.1); }
  }

  .wrapper {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  /* Header brand */
  .brand {
    text-align: center;
    margin-bottom: 36px;
  }
  .brand-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 0.2em;
    color: var(--white);
    line-height: 1;
  }
  .brand-sub {
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    color: #555;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .card {
    background: var(--grey);
    border: 1px solid var(--border);
    padding: 36px 32px;
    position: relative;
    overflow: hidden;
  }

  /* Corner accents */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: var(--white);
    border-style: solid;
    opacity: 0.4;
  }
  .card::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
  .card::after  { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

  .tab-row {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    color: #555;
    border: none;
    background: none;
    font-family: 'DM Mono', monospace;
    transition: color 0.3s;
    position: relative;
  }
  .tab.active {
    color: var(--white);
  }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 1px;
    background: var(--white);
  }

  .form-section { display: none; }
  .form-section.active { display: block; }

  .field {
    margin-bottom: 18px;
  }
  label {
    display: block;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 7px;
  }

  .input-wrap {
    position: relative;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    background: var(--black);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.3s;
    letter-spacing: 0.05em;
  }
  input:focus {
    border-color: var(--white);
  }

  /* Show password toggle */
  .eye-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #555;
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    transition: color 0.2s;
    padding: 2px 4px;
  }
  .eye-btn:hover { color: var(--white); }

  input[type="password"], input.has-toggle {
    padding-right: 52px;
  }

  .btn-submit {
    width: 100%;
    margin-top: 8px;
    padding: 13px;
    background: var(--white);
    color: var(--black);
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.25em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .btn-submit::before {
    content: '';
    position: absolute;
    left: -100%;
    top: 0; bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.1);
    transition: left 0.3s;
  }
  .btn-submit:hover::before { left: 0; }
  .btn-submit:active { transform: scale(0.99); }

  .msg {
    margin-top: 14px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-align: center;
    padding: 8px;
    border: 1px solid;
  }
  .msg.error  { color: #ff6b6b; border-color: #ff6b6b33; background: #ff6b6b0a; }
  .msg.success{ color: #6bffb8; border-color: #6bffb833; background: #6bffb80a; }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrapper">
  <div class="brand">
    <div class="brand-title">CHURN<span style="opacity:0.3">_</span>ADMIN</div>
    <div class="brand-sub">Employee Analytics Platform</div>
  </div>

  <div class="card">
    <div class="tab-row">
      <button class="tab active" onclick="switchTab('login', this)">LOGIN</button>
      <button class="tab" onclick="switchTab('register', this)">REGISTER</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="form-section active" id="tab-login">
      <form method="POST" action="/login">
        <input type="hidden" name="action" value="login">
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" placeholder="your_username" required autocomplete="off">
        </div>
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="lpass" name="password" placeholder="••••••••" required>
            <button type="button" class="eye-btn" onclick="togglePass('lpass', this)">SHOW</button>
          </div>
        </div>
        {% if error %}
        <div class="msg error">⚠ {{ error }}</div>
        {% endif %}
        <button type="submit" class="btn-submit">ENTER SYSTEM</button>
      </form>
    </div>

    <!-- REGISTER FORM -->
    <div class="form-section" id="tab-register">
      <form method="POST" action="/register">
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" placeholder="choose_username" required autocomplete="off">
        </div>
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="rpass" name="password" placeholder="••••••••" required>
            <button type="button" class="eye-btn" onclick="togglePass('rpass', this)">SHOW</button>
          </div>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <div class="input-wrap">
            <input type="password" id="rpass2" name="confirm_password" placeholder="••••••••" required>
            <button type="button" class="eye-btn" onclick="togglePass('rpass2', this)">SHOW</button>
          </div>
        </div>
        {% if reg_error %}
        <div class="msg error">⚠ {{ reg_error }}</div>
        {% endif %}
        {% if reg_success %}
        <div class="msg success">✓ {{ reg_success }}</div>
        {% endif %}
        <button type="submit" class="btn-submit">CREATE ACCOUNT</button>
      </form>
    </div>
  </div>
</div>

<script>
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function togglePass(id, btn) {
  const input = document.getElementById(id);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = 'HIDE';
  } else {
    input.type = 'password';
    btn.textContent = 'SHOW';
  }
}

// Auto-switch to register tab if register error/success exists
{% if reg_error or reg_success %}
switchTab('register', document.querySelectorAll('.tab')[1]);
{% endif %}
</script>
</body>
</html>
